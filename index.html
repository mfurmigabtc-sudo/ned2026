<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NED 2026 - Controle de Evento</title>
    <meta name="description" content="Sistema de controle de presença por QR Code - NED 2026">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- BG overlay -->
    <div class="bg-overlay"></div>

    <!-- Header -->
    <header class="header">
        <img src="LOGO2026.png" alt="NED 2026" class="logo" id="logo">
    </header>

    <!-- Navigation -->
    <nav class="nav" id="main-nav">
        <button class="nav-btn active" data-tab="gerar" id="btn-tab-gerar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><circle cx="17.5" cy="17.5" r="3.5"/></svg>
            Gerar Ingressos
        </button>
        <button class="nav-btn" data-tab="validar" id="btn-tab-validar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            Validar Presença
        </button>
        <button class="nav-btn" data-tab="lista" id="btn-tab-lista">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Convidados
        </button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">

        <!-- TAB: Gerar Ingressos -->
        <section class="tab-panel active" id="panel-gerar">
            <div class="card">
                <h2 class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><circle cx="17.5" cy="17.5" r="3.5"/></svg>
                    Gerar Ingressos
                </h2>
                <p class="card-desc">Insira o nome do convidado para gerar 20 entradas com QR Codes únicos.</p>

                <form id="form-gerar" class="form-gerar">
                    <div class="input-group">
                        <input
                            type="text"
                            id="input-nome"
                            placeholder="Nome do convidado..."
                            autocomplete="off"
                            required
                        >
                        <button type="submit" class="btn-primary" id="btn-gerar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Gerar
                        </button>
                    </div>
                </form>

                <!-- Ingressos gerados -->
                <div id="ingresso-resultado" class="ingresso-resultado hidden">
                    <div class="resultado-header">
                        <h3 id="resultado-nome"></h3>
                        <div class="resultado-actions">
                            <button class="btn-download" id="btn-download-todos">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                Baixar Todos (ZIP)
                            </button>
                        </div>
                    </div>

                    <!-- Progress bar for generation -->
                    <div id="progress-container" class="progress-container hidden">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <p class="progress-text" id="progress-text">Gerando ingressos...</p>
                    </div>

                    <div id="ingressos-grid" class="ingressos-grid"></div>
                </div>
            </div>
        </section>

        <!-- TAB: Validar Presença -->
        <section class="tab-panel" id="panel-validar">
            <div class="card">
                <h2 class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    Validar Presença
                </h2>
                <p class="card-desc">Aponte a câmera para o QR Code do convidado.</p>

                <div class="scanner-container">
                    <div id="scanner-box" class="scanner-box">
                        <div id="reader" style="width: 100%;"></div>
                    </div>

                    <div class="scanner-controls">
                        <button class="btn-primary" id="btn-iniciar-scanner">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                            Iniciar Câmera
                        </button>
                        <button class="btn-secondary hidden" id="btn-parar-scanner">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                            Parar
                        </button>
                    </div>

                    <!-- Manual input -->
                    <div class="manual-input">
                        <p class="divider-text">ou digite o código manualmente</p>
                        <div class="input-group">
                            <input type="text" id="input-codigo" placeholder="NED2026-XX-XXX-XXXXXXXX">
                            <button class="btn-primary" id="btn-validar-manual">Validar</button>
                        </div>
                    </div>
                </div>

                <!-- Resultado da validação -->
                <div id="validacao-resultado" class="validacao-resultado hidden"></div>
            </div>
        </section>

        <!-- TAB: Lista de Convidados -->
        <section class="tab-panel" id="panel-lista">
            <div class="card">
                <h2 class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Convidados
                </h2>
                <p class="card-desc">Lista de todos os convidados cadastrados.</p>

                <div id="lista-convidados" class="lista-convidados">
                    <p class="loading">Carregando...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal para ver ingressos de um convidado -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal modal-wide" id="modal-detalhes">
            <button class="modal-close" id="btn-fechar-modal">&times;</button>
            <div class="modal-header">
                <h3 id="modal-titulo"></h3>
                <button class="btn-download btn-download-sm hidden" id="btn-modal-download">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Baixar Todos
                </button>
            </div>
            <div id="modal-conteudo" class="modal-conteudo"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Libraries -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
